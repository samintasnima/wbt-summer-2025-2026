<!DOCTYPE html>

<body>      
             <h1>Contact Me</h1>
    <!-- Simple Registration Form -->
    <form method="post">

        <fieldset>
            <legend>Registration Form</legend>
            <label for="first name">First Name:</label>
            <input type="text" id="name" placeholder="Enter your name" name="name" required><br><br>
             <label for="last name">Last Name:</label>
            <input type="text" id="name" placeholder="Enter your name" name="name" required><br><br>
            <input type="radio" name="gender" value="male"> Male
            <input type="radio" name="gender" value="female"> Female<br><br>
                 <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email" required></td>
                </tr>
               <br>
              <tr>
                    <td><label>Reason of contact:</label></td>
                    <td>
                        <input type="checkbox" value="Job"> Job
                        <input type="checkbox" value="Projects"> Projects
                        <input type="checkbox" value="Thesis"> Thesis
                       
                    </td>
                </tr>
                <br>
        
                <br>
            <label for="Book Slot">Book Slot:</label>
            <input type="date" id="book" placeholder="Enter date" date="date" required><br><br>
            </fieldset>
            <br>
              <button>Submit</button>
               <br>
                 <button>Reset</button>
                <br>
                <a href="index.html">Back to home</a> 
</body>
